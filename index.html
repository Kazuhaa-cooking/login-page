<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paimon</title>
<style>
    body {
    height: 100vh;
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #f425ff, #00f2ff, #33ffb1, #d12bff);
    background-size: 800% 800%;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: gradientFlow 6.4s ease forwards;
    }

    @keyframes gradientFlow {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
    }

    .login-container {
        background: rgb(249, 249, 249);
        padding: 40px 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        width: 320px;
        text-align: center;
    }

    .login-container h2 {
        margin-bottom: 25px;
        color: #00ccf5;
    }

    .login-input {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 20px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 14px;
        transition: border-color 0.3s;
    }

    .login-input:focus {
        border-color: #1ae8ff;
        outline: none;
    }

    .login-button {
        background-color: #1ae8ff;
        color: white;
        border: none;
        padding: 15px 25px;
        border-radius: 18px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
        transition: box-shadow 0.4s, background-color 0.4s, color 0.4s, padding 0.3s;
    }

    .login-button:hover {
        box-shadow: 0 8px 20px rgba(26, 175, 255, 0.4);
        background-color: white;
        color: #1ae8ff;
        padding: 18px 28px;
    }

    .login-button:active {
        color: rgba(26, 175, 255, 0.5);
    }

    .forgot {
        display: block;
        margin-top: 15px;
        font-size: 12px;
        color: #555;
        text-decoration: none;
        transition:padding-top 0.5s, padding-right 0.5s, padding-left 0.5s, padding-bottom 0.5s,font-size 0.5s;
    }

    .forgot:hover {
        color: black;
        font-size: 14px;
        padding-top:7px;
        padding-right:7px;
        padding-left:7px;
        padding-bottom: 7px;
    }
</style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>
    <input type="text" placeholder="Username" class="login-input">
    <input type="password" placeholder="Password" class="login-input">
    <button class="login-button">Log in</button>
    <a href="#" class="forgot">Forgot password ?</a>
</div>

</body>
</html>
